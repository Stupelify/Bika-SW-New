# nginx-proxy config for banquet.bikafood.com
# Lives OUTSIDE the app compose stack — manages host ports 80/443.
#
# Key fix: resolver + set $upstream pattern forces DNS re-resolution
# every 10s, preventing 502s after container rebuilds.

resolver 127.0.0.11 valid=10s ipv6=off;
resolver_timeout 5s;

# --- HTTP: redirect to HTTPS ---

server {
    listen 80;
    server_name banquet.bikafood.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 80;
    server_name metabase.bikafood.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 80;
    server_name status.bikafood.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: banquet.bikafood.com ---

server {
    listen 443 ssl;
    server_name banquet.bikafood.com;

    ssl_certificate /etc/letsencrypt/live/banquet.bikafood.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/banquet.bikafood.com/privkey.pem;

    location / {
        set $client_upstream http://bika-banquet-client-1:3000;
        proxy_pass $client_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        set $server_upstream http://bika-banquet-server-1:5000;
        proxy_pass $server_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}
