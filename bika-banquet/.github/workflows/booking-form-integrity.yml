name: Booking Form Integrity

on:
  pull_request:
    paths:
      - 'bika-banquet/client/src/app/dashboard/bookings/**'
      - 'bika-banquet/client/src/components/Booking*.tsx'
      - 'bika-banquet/client/src/lib/booking-form/**'
      - 'bika-banquet/client/e2e/booking-form/**'
      - 'bika-banquet/native-client/**'
      - 'bika-banquet/server/src/controllers/booking.*'
      - 'bika-banquet/server/src/routes/booking.routes.ts'
      - 'bika-banquet/.github/workflows/booking-form-integrity.yml'

jobs:
  unit-booking-form:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bika-banquet/client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: bika-banquet/client/package-lock.json
      - run: npm ci
      - run: npm run test:unit:booking-form

  server-booking-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bika-banquet/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: bika-banquet/server/package-lock.json
      - run: npm ci
      - run: npm test -- --testPathPatterns=booking
