name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    # Self-hosted runner on the VPS — avoids SSH from GitHub cloud runners,
    # which currently times out on port 22 to this host.
    runs-on: [self-hosted, linux, bika-banquet]
    timeout-minutes: 60

    steps:
      - name: Deploy on VPS
        run: |
          APP_DIR="/root/bika-banquet-v2/bika-banquet"
          if [ ! -d "$APP_DIR" ]; then
            echo "ERROR: App directory not found: $APP_DIR"
            exit 1
          fi
          bash "$APP_DIR/scripts/ci-deploy.sh"
