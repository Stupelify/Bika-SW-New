name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Setup SSH
        run: |
          mkdir -p "$HOME/.ssh"
          printf '%s' "${{ secrets.VPS_SSH_KEY }}" | base64 -d > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> "$HOME/.ssh/known_hosts" 2>/dev/null

      - name: Deploy
        run: |
          ssh -o ServerAliveInterval=60 -o ServerAliveCountMax=120 -i "$HOME/.ssh/deploy_key" root@${{ secrets.VPS_HOST }} << 'ENDSSH'
          set -e
          cd /root/bika-banquet-v2/bika-banquet
          set -a
          . ./.env
          set +a

          echo "==> Pulling latest code"
          git fetch origin
          git reset --hard origin/master

          echo "==> Applying tracked SQL patches"
          docker exec -i bika-banquet-db-1 psql -U postgres -d "$DB_NAME" <<'SQL'
          CREATE TABLE IF NOT EXISTS _raw_migrations (
            name TEXT PRIMARY KEY,
            applied_at TIMESTAMPTZ NOT NULL DEFAULT now()
          );
          SQL

          find server/prisma -maxdepth 2 -type f -name '*.sql' ! -name 'legacy_schema.sql' | sort | while read -r file; do
            name="${file#server/prisma/}"
            already_applied="$(docker exec -i bika-banquet-db-1 psql -U postgres -d "$DB_NAME" -tAc "SELECT 1 FROM _raw_migrations WHERE name = '$name'")"
            if [ "$already_applied" = "1" ]; then
              echo "  skip  $name"
              continue
            fi
            echo "  apply $name"
            docker exec -i bika-banquet-db-1 psql -U postgres -d "$DB_NAME" < "$file"
            docker exec -i bika-banquet-db-1 psql -U postgres -d "$DB_NAME" -c "INSERT INTO _raw_migrations (name) VALUES ('$name')"
          done

          echo "==> Building images (BuildKit cache enabled)"
          DOCKER_BUILDKIT=1 docker compose build --parallel

          echo "==> Recreating app containers (non-destructive)"
          docker compose up -d --no-deps --force-recreate server client nginx

          echo "==> Ensure all services up (no double-recreate)"
          docker compose up -d --no-recreate

          echo "==> Health check (up to 90s)"
          healthy=0
          for i in $(seq 1 18); do
            if docker compose exec -T server curl -fs http://localhost:5000/health >/dev/null 2>&1; then
              echo "Server healthy after $((i * 5))s"
              healthy=1
              break
            fi
            echo "Waiting... ($i/18)"
            sleep 5
          done

          if [ "$healthy" -eq 0 ]; then
            echo "ERROR: Server failed health check after 90s"
            docker compose logs --tail=50 server
            exit 1
          fi

          docker compose ps
          ENDSSH
