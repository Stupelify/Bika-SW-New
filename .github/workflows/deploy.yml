name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Setup SSH
        run: |
          mkdir -p "$HOME/.ssh"
          printf '%s' "${{ secrets.VPS_SSH_KEY }}" | base64 -d > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> "$HOME/.ssh/known_hosts" 2>/dev/null

      - name: Deploy
        run: |
          ssh -i "$HOME/.ssh/deploy_key" root@${{ secrets.VPS_HOST }} << 'ENDSSH'
          set -e
          cd /root/bika-banquet-v2/bika-banquet

          echo "==> Pulling latest code"
          git fetch origin
          git reset --hard origin/master

          echo "==> Building images (BuildKit cache enabled)"
          DOCKER_BUILDKIT=1 docker compose build --parallel

          echo "==> Recreating app containers (non-destructive)"
          docker compose up -d --no-deps --force-recreate server client nginx

          echo "==> Ensure all services up"
          docker compose up -d

          echo "==> Health check"
          for i in 1 2 3 4 5 6; do
            if docker compose exec -T server curl -fs http://localhost:5000/health >/dev/null 2>&1; then
              echo "Server healthy"
              break
            fi
            echo "Waiting... ($i/6)"
            sleep 5
          done

          docker compose ps
          ENDSSH
