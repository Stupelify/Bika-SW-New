name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key_path: ~/.ssh/deploy_key
          command_timeout: 30m
          script: |
            set -e
            cd /root/bika-banquet-v2/bika-banquet

            echo "==> Pulling latest code"
            git fetch origin
            git reset --hard origin/master

            echo "==> Building images (BuildKit cache enabled)"
            DOCKER_BUILDKIT=1 docker compose build --parallel

            echo "==> Starting containers"
            docker compose up -d

            echo "==> Running migrations"
            docker compose exec -T server npx prisma migrate deploy

            echo "==> Health check"
            sleep 10
            docker compose ps
