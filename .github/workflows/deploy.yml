name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p $HOME/.ssh
          printf '%s' "${{ secrets.VPS_SSH_KEY }}" | base64 -d > $HOME/.ssh/deploy_key
          chmod 600 $HOME/.ssh/deploy_key

      - name: Deploy
        timeout-minutes: 30
        run: |
          ssh -i $HOME/.ssh/deploy_key -o StrictHostKeyChecking=no root@${{ secrets.VPS_HOST }} << 'ENDSSH'
          set -e
          cd /root/bika-banquet-v2/bika-banquet

          echo "==> Pulling latest code"
          git fetch origin
          git reset --hard origin/master

          echo "==> Building images (BuildKit cache enabled)"
          DOCKER_BUILDKIT=1 docker compose build --parallel

          echo "==> Stopping old containers"
          docker compose down --remove-orphans 2>/dev/null || true
          docker compose -p bikabanquet_v2 down --remove-orphans 2>/dev/null || true
          docker stop bika-db 2>/dev/null || true
          docker rm bika-db 2>/dev/null || true
          for port in 80 443 3000 3001 3002; do
            docker ps -q --filter "publish=$port" | xargs -r docker rm -f
          done

          echo "==> Starting containers"
          docker compose up -d

          echo "==> Running migrations"
          docker compose exec -T server npx prisma migrate deploy || echo "Migration skipped (baseline DB)"

          echo "==> Health check"
          sleep 10
          docker compose ps
          ENDSSH
