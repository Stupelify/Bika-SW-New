<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Primary Color Scale" subtitle="Teal brand palette — teal-50 through teal-900" viewport="700x160" -->
<html lang="en">
<head><meta charset="UTF-8"><style>
  body { margin: 0; padding: 16px; font-family: 'Inter', ui-sans-serif, sans-serif; background: #f8fafc; }
  .row { display: flex; gap: 0; border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; }
  .swatch { flex: 1; height: 72px; display: flex; flex-direction: column; justify-content: flex-end; padding: 6px 8px; }
  .swatch span { font-size: 10px; font-weight: 600; line-height: 1.3; }
  .meta { display: flex; gap: 24px; margin-top: 10px; }
  .meta-item { display: flex; flex-direction: column; gap: 3px; }
  .meta-item label { font-size: 10px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
  .meta-item span { font-size: 12px; color: #0f172a; font-weight: 600; }
  .action-row { display: flex; gap: 8px; margin-top: 10px; }
  .pill { display: inline-flex; align-items: center; justify-content: center; height: 28px; padding: 0 12px; border-radius: 9999px; font-size: 11px; font-weight: 700; }
</style></head>
<body>
  <div class="row">
    <div class="swatch" style="background:#f0fdfa"><span style="color:#0f766e">50</span></div>
    <div class="swatch" style="background:#ccfbf1"><span style="color:#0f766e">100</span></div>
    <div class="swatch" style="background:#99f6e4"><span style="color:#0f766e">200</span></div>
    <div class="swatch" style="background:#5eead4"><span style="color:#0f766e">300</span></div>
    <div class="swatch" style="background:#2dd4bf"><span style="color:#fff">400</span></div>
    <div class="swatch" style="background:#14b8a6"><span style="color:#fff">500</span></div>
    <div class="swatch" style="background:#0d9488"><span style="color:#fff">600 ★</span></div>
    <div class="swatch" style="background:#0f766e"><span style="color:#fff">700</span></div>
    <div class="swatch" style="background:#115e59"><span style="color:#fff">800</span></div>
    <div class="swatch" style="background:#134e4a"><span style="color:#fff">900</span></div>
  </div>
  <div class="meta">
    <div class="meta-item"><label>Primary Action</label><span>#0d9488 — teal-600</span></div>
    <div class="meta-item"><label>Hover</label><span>#0f766e — teal-700</span></div>
    <div class="meta-item"><label>Focus Ring</label><span>rgba(13,148,136,0.18)</span></div>
    <div class="meta-item"><label>Theme Color</label><span>#0d9488</span></div>
  </div>
  <div class="action-row">
    <div class="pill" style="background:#0d9488;color:white">Primary Button</div>
    <div class="pill" style="background:#f0fdfa;color:#0f766e;border:1px solid #ccfbf1">Active Nav</div>
    <div class="pill" style="background:#f0fdfa;color:#0f766e;border:1px solid #99f6e4">Teal Badge</div>
  </div>
</body>
</html>
