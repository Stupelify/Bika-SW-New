<!DOCTYPE html>
<!-- @dsCard group="Components" name="KPI Cards" subtitle="Metric cards with delta badges and sparklines" viewport="700x140" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap">
<style>
  body { margin: 0; padding: 16px; font-family: 'Inter', ui-sans-serif, sans-serif; background: #f1f5f9; display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-start; }
  .kpi { background: white; border: 1px solid #e2e8f0; border-radius: 18px; padding: 18px 20px; box-shadow: 0 1px 2px rgba(15,23,42,0.04); width: 170px; }
  .kpi-label { font-size: 11px; font-weight: 600; color: #6b7280; letter-spacing: 0.02em; text-transform: uppercase; display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .kpi-value { font-size: 22px; font-weight: 700; color: #0f172a; letter-spacing: -0.03em; line-height: 1; margin-bottom: 8px; font-variant-numeric: tabular-nums; }
  .delta { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 9999px; }
  .up { background: #dcfce7; color: #15803d; }
  .down { background: #fef2f2; color: #dc2626; }
  .neutral { background: #f1f5f9; color: #64748b; }
  .sparkline { vertical-align: middle; }
  svg { stroke-width: 1.75; fill: none; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>
  <div class="kpi">
    <div class="kpi-label">
      <span>Total Revenue</span>
      <svg width="15" height="15" viewBox="0 0 24 24" stroke="#6b7280"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
    </div>
    <div class="kpi-value">₹24.5L</div>
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <span class="delta up">↑ 12% Trend</span>
      <svg class="sparkline" viewBox="0 0 60 24" width="52" height="20" stroke="#14b8a6" fill="none"><polyline points="0,20 10,15 20,16 30,8 40,10 50,4 60,6"/></svg>
    </div>
  </div>
  <div class="kpi">
    <div class="kpi-label">
      <span>Bookings</span>
      <svg width="15" height="15" viewBox="0 0 24 24" stroke="#6b7280"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><polyline points="9 16 11 18 15 14"/></svg>
    </div>
    <div class="kpi-value">142</div>
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <span class="delta up">↑ 8% Trend</span>
      <svg class="sparkline" viewBox="0 0 60 24" width="52" height="20" stroke="#14b8a6" fill="none"><polyline points="0,18 10,16 20,14 30,12 40,10 50,7 60,5"/></svg>
    </div>
  </div>
  <div class="kpi">
    <div class="kpi-label">
      <span>Pencil Bookings</span>
      <svg width="15" height="15" viewBox="0 0 24 24" stroke="#6b7280"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    </div>
    <div class="kpi-value">7</div>
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <span class="delta down">↓ 5% Trend</span>
      <svg class="sparkline" viewBox="0 0 60 24" width="52" height="20" stroke="#14b8a6" fill="none"><polyline points="0,8 10,10 20,7 30,12 40,9 50,14 60,11"/></svg>
    </div>
  </div>
  <div class="kpi">
    <div class="kpi-label">
      <span>Avg. Booking</span>
      <svg width="15" height="15" viewBox="0 0 24 24" stroke="#6b7280"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
    </div>
    <div class="kpi-value">₹1.7L</div>
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <span class="delta neutral">— Trend</span>
      <svg class="sparkline" viewBox="0 0 60 24" width="52" height="20" stroke="#14b8a6" fill="none"><polyline points="0,12 10,11 20,13 30,11 40,12 50,10 60,12"/></svg>
    </div>
  </div>
</body>
</html>
