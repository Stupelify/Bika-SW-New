<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Shadow Elevation System" subtitle="xs/sm/md/lg shadows + FAB teal glow" viewport="700x160" -->
<html lang="en">
<head><meta charset="UTF-8"><style>
  body { margin: 0; padding: 16px; font-family: 'Inter', ui-sans-serif, sans-serif; background: #f1f5f9; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .item { background: white; border-radius: 14px; padding: 16px 14px; display: flex; flex-direction: column; gap: 8px; }
  .label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #94a3b8; }
  .val { font-size: 10px; font-family: 'SF Mono', monospace; color: #64748b; margin-top: 2px; }
</style></head>
<body>
  <div class="grid">
    <div class="item" style="box-shadow: 0 1px 2px rgba(15,23,42,0.04)">
      <div class="label">shadow-xs</div>
      <div class="val">0 1px 2px rgba(15,23,42, 0.04)</div>
      <div style="font-size:11px;color:#64748b">Cards, KPI cards, default elevation</div>
    </div>
    <div class="item" style="box-shadow: 0 1px 3px rgba(15,23,42,0.06), 0 1px 2px rgba(15,23,42,0.04)">
      <div class="label">shadow-sm</div>
      <div class="val">0 1px 3px + 0 1px 2px</div>
      <div style="font-size:11px;color:#64748b">Slightly elevated panels</div>
    </div>
    <div class="item" style="box-shadow: 0 4px 6px rgba(15,23,42,0.05), 0 2px 4px rgba(15,23,42,0.04)">
      <div class="label">shadow-md</div>
      <div class="val">0 4px 6px + 0 2px 4px</div>
      <div style="font-size:11px;color:#64748b">Modals, focused elements</div>
    </div>
    <div class="item" style="box-shadow: 0 10px 15px rgba(15,23,42,0.06), 0 4px 6px rgba(15,23,42,0.04)">
      <div class="label">shadow-lg</div>
      <div class="val">0 10px 15px + 0 4px 6px</div>
      <div style="font-size:11px;color:#64748b">Dropdowns, command palette</div>
    </div>
  </div>
  <div style="margin-top: 12px; background: white; border-radius: 14px; padding: 12px 14px; box-shadow: 0 4px 14px rgba(13,148,136,0.35); display: inline-flex; align-items: center; gap: 8px;">
    <div style="width: 28px; height: 28px; background: linear-gradient(135deg, #0d9488, #14b8a6); border-radius: 10px;"></div>
    <div style="font-size: 11px; font-weight: 600; color: #64748b;">FAB shadow: 0 4px 14px rgba(13,148,136,0.35)</div>
  </div>
</body>
</html>
