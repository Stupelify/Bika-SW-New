<!DOCTYPE html>
<!-- @dsCard group="Components" name="Buttons" subtitle="Primary / secondary / danger / row-btn / FAB variants" viewport="700x240" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap">
<style>
  body { margin: 0; padding: 16px; font-family: 'Inter', ui-sans-serif, sans-serif; background: #f8fafc; }
  .row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; align-items: center; }
  .label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #94a3b8; width: 100%; margin-bottom: 2px; }
  .btn { display: inline-flex; align-items: center; gap: 6px; border-radius: 12px; padding: 7px 14px; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; white-space: nowrap; border: none; transition: all 0.15s; }
  .btn-primary { background: #0d9488; color: white; box-shadow: 0 1px 3px rgba(13,148,136,0.20); }
  .btn-secondary { background: white; color: #334155; border: 1px solid #cbd5e1 !important; box-shadow: 0 1px 2px rgba(15,23,42,0.04); }
  .btn-danger { background: #ef4444; color: white; box-shadow: 0 1px 3px rgba(239,68,68,0.28); }
  .btn-ghost { background: transparent; color: #64748b; border: 1px solid transparent !important; }
  .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 10px; }
  .btn-lg { padding: 11px 20px; font-size: 14px; }
  .disabled { opacity: 0.5; cursor: not-allowed; }
  .row-btn { padding: 3px 9px; border-radius: 8px; background: white; border: 1px solid #cbd5e1; font-size: 12px; font-weight: 550; color: #64748b; cursor: pointer; font-family: inherit; display: inline-flex; align-items: center; gap: 4px; }
  svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>
  <div class="row">
    <div class="label">Primary</div>
    <button class="btn btn-primary">Add Booking</button>
    <button class="btn btn-primary btn-sm">Add Booking</button>
    <button class="btn btn-primary btn-lg">Add Booking</button>
    <button class="btn btn-primary disabled" disabled>Disabled</button>
  </div>
  <div class="row">
    <div class="label">Secondary</div>
    <button class="btn btn-secondary">Export</button>
    <button class="btn btn-secondary btn-sm">Export</button>
    <button class="btn btn-secondary">
      <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
      Refresh
    </button>
  </div>
  <div class="row">
    <div class="label">Danger</div>
    <button class="btn btn-danger">Delete</button>
    <button class="btn btn-danger btn-sm">Cancel Booking</button>
  </div>
  <div class="row">
    <div class="label">Row Actions (table inline)</div>
    <button class="row-btn">View</button>
    <button class="row-btn">Edit</button>
    <button class="row-btn" style="color:#ef4444;border-color:#fca5a5">Cancel</button>
  </div>
  <div class="row">
    <div class="label">FAB (Floating Action Button)</div>
    <div style="width:52px;height:52px;border-radius:16px;background:linear-gradient(135deg,#0d9488,#14b8a6);color:white;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(13,148,136,0.35);">
      <svg viewBox="0 0 24 24" style="width:24px;height:24px;stroke-width:2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </div>
  </div>
</body>
</html>
