[data-theme=dark]{

}
html,body,#root{height:100%;overflow:hidden}
body{font-family:'Inter',ui-sans-serif,sans-serif;font-size:14px;color:var(--text-2);background:var(--bg);-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:3px}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .15s ease both}

/* ═══════════════════════════════════ HELPERS ════════════════ */
function isoDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function parseDate(iso) { return new Date(iso+'T00:00:00'); }
function dayName(d,short=true) { return short ? ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()] : ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][d.getDay()]; }
function monthName(d,short=false) { return short ? ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()] : ['January','February','March','April','May','June','July','August','September','October','November','December'][d.getMonth()]; }
function fmtINR(n) { if(n>=100000) return `₹${(n/100000).toFixed(1)}L`; if(n>=1000) return `₹${Math.round(n/1000)}K`; return `₹${n}`; }
function forDate(iso) { return BOOKINGS.filter(b=>b.date===iso); }
function hallOf(id) { return HALLS.find(h=>h.id===id); }
function slotOf(id) { return SLOTS.find(s=>s.id===id); }
function statusOf(k) { return STATUS[k]||STATUS.pending; }
function weekStart(iso) { const d=parseDate(iso); d.setDate(d.getDate()-d.getDay()); return d; }
function buildMonthGrid(y,m) {
  const first=new Date(y,m,1); const off=first.getDay();
  const cur=new Date(y,m,1-off);
  return Array.from({length:42},()=>{ const d=new Date(cur); cur.setDate(cur.getDate()+1); return d; });
}

/* ═══════════════════════════════════ BOOKING DETAIL DRAWER ══ */
function BookingDrawer({ booking, onClose }) {
  if (!booking) return null;
  const hall = hallOf(booking.hall);
  const slot = slotOf(booking.slot);
  const s = statusOf(booking.status);
  const d = parseDate(booking.date);
  return (
    <div style={{ position:'fixed',inset:0,zIndex:200 }}>
      <div onClick={onClose} style={{ position:'absolute',inset:0,background:'rgba(15,23,42,.4)' }} />
      <div className="fade-in" style={{ position:'absolute',bottom:0,left:0,right:0,background:'var(--surface)',borderRadius:'20px 20px 0 0',padding:'20px 20px 32px',boxShadow:'0 -8px 32px rgba(15,23,42,.12)',maxHeight:'80vh',overflow:'auto' }}>
        <div style={{ width:36,height:4,borderRadius:2,background:'var(--surface-3)',margin:'0 auto 16px' }} />
        {/* Hall bar */}
        <div style={{ height:4,borderRadius:2,background:hall.color,marginBottom:16 }} />
        <div style={{ display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12,marginBottom:14 }}>
          <div>
            <p style={{ fontSize:19,fontWeight:800,color:'var(--text-1)',letterSpacing:'-0.02em',lineHeight:1.15 }}>{booking.fn}</p>
            <p style={{ fontSize:13,color:'var(--text-3)',marginTop:4 }}>{booking.customer}</p>
          </div>
          <span style={{ fontSize:11,fontWeight:800,padding:'4px 10px',borderRadius:9999,background:s.bg,color:s.text,flexShrink:0,textTransform:'uppercase',letterSpacing:'0.04em' }}>{s.label}</span>
        </div>
        <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16 }}>
          {[
            ['Hall', hall.name, hall.color],
            ['Date', `${dayName(d,false)}, ${d.getDate()} ${monthName(d)} ${d.getFullYear()}`, null],
            ['Slot', `${slot.label} · ${slot.range}`, null],
            ['Type', booking.type, null],
            ['Guests', `${booking.guests} pax`, null],
            ['Grand Total', fmtINR(booking.grand), '#0d9488'],
          ].map(([k,v,c])=>(
            <div key={k} style={{ background:'var(--surface-2)',borderRadius:10,padding:'10px 12px' }}>
              <p style={{ fontSize:10,fontWeight:700,color:'var(--text-4)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:4 }}>{k}</p>
              <p style={{ fontSize:14,fontWeight:700,color:c||'var(--text-1)',fontVariantNumeric:'tabular-nums' }}>{v}</p>
            </div>
          ))}
        </div>
        {booking.conflict && (
          <div style={{ display:'flex',alignItems:'center',gap:8,padding:'10px 14px',background:'#fef2f2',border:'1px solid #fca5a5',borderRadius:10,marginBottom:14,fontSize:12,fontWeight:600,color:'#991b1b' }}>
            {IC.warn} Double-booked — Crystal Hall Lunch on this date has a conflict
          </div>
        )}
        <div style={{ display:'flex',gap:8 }}>
          <button style={{ flex:1,padding:'11px',borderRadius:12,border:'none',background:'var(--teal-600)',color:'white',fontSize:13,fontWeight:700 }}>View Booking</button>
          <button onClick={onClose} style={{ width:46,borderRadius:12,border:'1px solid var(--border-2)',background:'var(--surface)',color:'var(--text-3)',display:'flex',alignItems:'center',justifyContent:'center' }}>{IC.x}</button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════ TOOLBAR ════════════════ */
function Toolbar({ view, onView, focusDate, onPrev, onNext, onToday, theme, onTheme, isMobile }) {
  const d = parseDate(focusDate);
  const ws = weekStart(focusDate);
  const we = new Date(ws); we.setDate(ws.getDate()+6);

  const label = view==='month'
    ? `${monthName(d)} ${d.getFullYear()}`
    : view==='week'
    ? `${ws.getDate()} – ${we.getDate()} ${monthName(we)} ${we.getFullYear()}`
    : `${dayName(d,false)}, ${d.getDate()} ${monthName(d)}`;

  const BtnIcon = ({onClick,children,title}) => (
    <button onClick={onClick} title={title} style={{ width:32,height:32,border:'1px solid var(--border)',background:'var(--surface)',color:'var(--text-3)',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center' }}>{children}</button>
  );

  return (
    <div style={{ flexShrink:0,background:'var(--surface)',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:8,padding:isMobile?'8px 12px':'10px 16px',flexWrap:'wrap' }}>
      <img src="https://assets.zyrosite.com/MBlLcEqY2yw3y2EF/1-2-removebg-scaled-e1752152009924-7iV2qZXAcVUCou9o.png" style={{ width:26,height:26,objectFit:'contain',flexShrink:0 }} alt="logo" />

        <BtnIcon onClick={onPrev}>{IC.chevL}</BtnIcon>
        <BtnIcon onClick={onNext}>{IC.chevR}</BtnIcon>
        <button onClick={onToday} style={{ padding:'0 10px',height:32,border:'1px solid var(--border)',background:'var(--surface)',color:'var(--text-2)',borderRadius:8,fontSize:12,fontWeight:600 }}>Today</button>
      </div>
      <span style={{ fontSize:isMobile?14:16,fontWeight:800,color:'var(--text-1)',letterSpacing:'-0.015em',marginLeft:4,flex:isMobile?1:undefined }}>{label}</span>
      <div style={{ marginLeft:'auto',display:'flex',alignItems:'center',gap:6 }}>
        {/* View switcher */}
        <div style={{ display:'inline-flex',background:'var(--surface-2)',padding:3,borderRadius:10,gap:2 }}>
          {(isMobile?['Day','Week','Month']:['Month','Week','Day']).map(v=>(
            <button key={v} onClick={()=>onView(v.toLowerCase())} style={{
              padding:isMobile?'5px 11px':'5px 14px',borderRadius:7,border:'none',fontWeight:view===v.toLowerCase()?700:500,fontSize:12,cursor:'pointer',
              background:view===v.toLowerCase()?'var(--surface)':'transparent',
              color:view===v.toLowerCase()?'var(--text-1)':'var(--text-3)',
              boxShadow:view===v.toLowerCase()?'0 1px 2px rgba(15,23,42,.08)':'none',
            }}>{v}</button>
          ))}
        </div>
        <BtnIcon onClick={onTheme} title="Toggle theme">{theme==='dark'?IC.sun:IC.moon}</BtnIcon>
        {!isMobile && (
          <button style={{ padding:'0 12px',height:32,border:'none',background:'var(--teal-600)',color:'white',borderRadius:10,fontSize:12,fontWeight:700,display:'inline-flex',alignItems:'center',gap:5,boxShadow:'0 1px 3px rgba(13,148,136,.25)' }}>
            {IC.plus}New Booking
          </button>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════ HALL LEGEND ════════════ */
function HallLegend() {
  return (
    <div style={{ display:'flex',alignItems:'center',gap:12,padding:'6px 16px',background:'var(--surface-2)',borderBottom:'1px solid var(--border)',flexShrink:0,overflowX:'auto' }}>
      {HALLS.map(h=>(
        <span key={h.id} style={{ display:'inline-flex',alignItems:'center',gap:5,fontSize:11,color:'var(--text-3)',whiteSpace:'nowrap' }}>
          <span style={{ width:8,height:8,borderRadius:2,background:h.color,flexShrink:0 }}/>
          {h.name}
        </span>
      ))}
      <span style={{ marginLeft:'auto',display:'inline-flex',gap:10 }}>
        {[['confirmed','#22c55e'],['pencil','#f59e0b'],['quotation','#3b82f6']].map(([k,c])=>(
          <span key={k} style={{ display:'inline-flex',alignItems:'center',gap:4,fontSize:11,color:'var(--text-3)' }}>
            <span style={{ width:10,height:8,borderRadius:2,background:STATUS[k].bg,border:`1px solid ${c}`,backgroundImage:k==='pencil'?STRIPE:'none' }}/>
            {STATUS[k].label}
          </span>
        ))}
        <span style={{ display:'inline-flex',alignItems:'center',gap:4,fontSize:11,color:'var(--text-3)' }}>
          <span style={{ width:1.5,height:12,background:'var(--teal-600)',display:'inline-block' }}/>Now
        </span>
      </span>

}

/* ═══════════════════════════════════ MONTH VIEW ═════════════ */
function MonthView({ focusDate, onDayClick, isMobile }) {
  const d = parseDate(focusDate);
  const days = buildMonthGrid(d.getFullYear(), d.getMonth());
  const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  return (
    <div className="fade-in" style={{ flex:1,display:'flex',flexDirection:'column',overflow:'hidden',background:'var(--surface)' }}>
      {/* DOW header */}
      <div style={{ display:'grid',gridTemplateColumns:'repeat(7,1fr)',background:'var(--surface-2)',borderBottom:'1px solid var(--border)',flexShrink:0 }}>
        {DOW.map((w,i)=>(
          <div key={w} style={{ padding:isMobile?'5px 0':'7px 10px',fontSize:isMobile?10:10.5,fontWeight:800,textTransform:'uppercase',letterSpacing:'0.07em',color:(i===0||i===6)?'#dc2626':'var(--text-4)',textAlign:isMobile?'center':'left' }}>{isMobile?w[0]:w}</div>
        ))}
      </div>
      {/* Grid */}
      <div style={{ flex:1,display:'grid',gridTemplateColumns:'repeat(7,1fr)',gridTemplateRows:'repeat(6,1fr)',background:'var(--surface)',minHeight:0 }}>
        {days.map((day,i)=>{
          const iso=isoDate(day); const inMo=day.getMonth()===d.getMonth();
          const isToday=iso===TODAY_ISO; const isSel=iso===focusDate;
          const list=forDate(iso); const isWk=day.getDay()===0||day.getDay()===6;
          const visible=list.slice(0,isMobile?2:4); const extra=list.length-visible.length;
          // hall strip
          const hallSet=new Set(list.map(b=>b.hall));
          return (
            <div key={i} onClick={()=>inMo&&onDayClick(iso)} style={{
              borderRight:(i%7)<6?'1px solid var(--border)':'none',
              borderBottom:i<35?'1px solid var(--border)':'none',
              padding:isMobile?'4px 3px':'5px 6px',
              background:isSel?'var(--teal-50)':isToday?'rgba(20,184,166,0.05)':isWk&&inMo?'#fafbfc':'var(--surface)',
              opacity:inMo?1:0.4,cursor:inMo?'pointer':'default',
              display:'flex',flexDirection:'column',gap:2,minHeight:0,overflow:'hidden',
              outline:isToday?'2px solid var(--teal-500)':'none',outlineOffset:-2,
            }}>
              <div style={{ display:'flex',alignItems:'baseline',justifyContent:'space-between',gap:2 }}>
                <span style={{ fontSize:isMobile?12:12.5,fontWeight:800,fontVariantNumeric:'tabular-nums',lineHeight:1,
                  color:isToday?'white':isWk?'#dc2626':'var(--text-1)',
                  background:isToday?'var(--teal-600)':'transparent',
                  padding:isToday?'1px 5px':0,borderRadius:isToday?8:0,
                }}>{day.getDate()}</span>
                {list.length>0&&!isMobile&&<span style={{ fontSize:9,fontWeight:700,color:'var(--text-4)',background:'var(--surface-2)',padding:'0 4px',borderRadius:5 }}>{list.length}</span>}
              </div>
              {/* Hall dots on mobile, pills on desktop */}
              {isMobile ? (
                <div style={{ display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:2 }}>
                  {HALLS.map(h=><div key={h.id} style={{ height:3,borderRadius:2,background:hallSet.has(h.id)?h.color:'var(--surface-2)',opacity:hallSet.has(h.id)?1:0.4 }}/>)}
                </div>
              ) : (
                <>
                  {visible.map(b=>{
                    const s=statusOf(b.status); const hall=hallOf(b.hall);
                    return (
                      <div key={b.id} style={{ background:s.bg,color:s.text,borderLeft:`2px solid ${hall.color}`,padding:'2px 5px',borderRadius:3,fontSize:10,fontWeight:700,lineHeight:1.25,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',backgroundImage:b.status==='pencil'?STRIPE:'none',position:'relative' }}>
                        {b.fn}
                        {b.conflict&&<span style={{ color:'#ef4444',marginLeft:3 }}>⚠</span>}
                      </div>
                    );
                  })}
                  {extra>0&&<span style={{ fontSize:9.5,color:'var(--text-4)',fontWeight:600,paddingLeft:2 }}>+{extra} more</span>}
                </>
              )}
              {isMobile&&list.length>0&&<span style={{ fontSize:9,fontWeight:800,color:'var(--text-4)',textAlign:'center',fontVariantNumeric:'tabular-nums' }}>{list.length}</span>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════ WEEK VIEW ══════════════ */
function WeekView({ focusDate, onDayClick, onBookingClick, isMobile }) {
  const ws = weekStart(focusDate);
  const days = Array.from({length:7},(_,i)=>{ const d=new Date(ws); d.setDate(ws.getDate()+i); return d; });

  // Mobile week: day cards + hall rows
  if (isMobile) {
    const [activeDay, setActiveDay] = useState(focusDate);
    const activeBks = forDate(activeDay).sort((a,b)=>slotOf(a.slot).startH - slotOf(b.slot).startH);
    return (
      <div className="fade-in" style={{ flex:1,display:'flex',flexDirection:'column',overflow:'hidden' }}>
        {/* Day selector */}
        <div style={{ background:'var(--surface)',borderBottom:'1px solid var(--border)',padding:'10px 10px 8px',display:'flex',gap:5,overflowX:'auto',flexShrink:0 }}>
          {days.map((d,i)=>{
            const iso=isoDate(d); const isActive=iso===activeDay; const isToday=iso===TODAY_ISO;
            const list=forDate(iso); const isWk=d.getDay()===0||d.getDay()===6;
            const hallSet=new Set(list.map(b=>b.hall));
            return (
              <button key={i} onClick={()=>setActiveDay(iso)} style={{
                flex:isActive?'0 0 70px':'0 0 48px',padding:isActive?'9px 6px':'8px 4px',
                borderRadius:13,border:isToday?'2px solid var(--teal-500)':'1px solid var(--border)',
                background:isActive?'var(--teal-600)':'var(--surface)',fontFamily:'inherit',
                display:'flex',flexDirection:'column',alignItems:'center',gap:3,transition:'flex 0.2s',
              }}>
                <span style={{ fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:isActive?'rgba(255,255,255,0.75)':isWk?'#dc2626':'var(--text-4)' }}>{dayName(d)}</span>
                <span style={{ fontSize:isActive?20:16,fontWeight:800,letterSpacing:'-0.02em',lineHeight:1,fontVariantNumeric:'tabular-nums',color:isActive?'white':'var(--text-1)' }}>{d.getDate()}</span>
                {isActive?<span style={{ fontSize:10,color:'rgba(255,255,255,0.8)',fontWeight:600 }}>{list.length} event{list.length!==1?'s':''}</span>
                :<div style={{ display:'flex',gap:2 }}>{HALLS.map(h=><span key={h.id} style={{ width:4,height:4,borderRadius:'50%',background:hallSet.has(h.id)?h.color:'var(--surface-3)' }}/>)}</div>}
              </button>
            );
          })}
        </div>
        {/* Hall rows for active day */}
        <div style={{ flex:1,overflowY:'auto',padding:'10px 10px 0' }}>
          {HALLS.map(hall=>{
            const hBks=activeBks.filter(b=>b.hall===hall.id);
            return (
              <div key={hall.id} style={{ marginBottom:10,background:'var(--surface)',borderRadius:14,overflow:'hidden',border:'1px solid var(--border)',borderLeft:`5px solid ${hall.color}` }}>
                <div style={{ display:'flex',alignItems:'center',gap:8,padding:'9px 12px',borderBottom:hBks.length?'1px solid var(--border)':'none',background:hall.tint }}>
                  <div style={{ flex:1 }}>
                    <p style={{ fontSize:13,fontWeight:800,color:'var(--text-1)' }}>{hall.name}</p>
                    <p style={{ fontSize:10.5,color:'var(--text-4)',marginTop:1 }}>cap. {hall.capacity} · {hBks.length} booking{hBks.length!==1?'s':''}</p>
                  </div>
                  <div style={{ display:'flex',gap:3 }}>
                    {SLOTS.map(sl=>{
                      const b=hBks.find(bk=>bk.slot===sl.id);
                      const s=b?statusOf(b.status):null;
                      return <div key={sl.id} title={sl.label} style={{ width:24,height:22,borderRadius:6,background:s?s.bg:'var(--surface-2)',border:`1px solid ${s?s.accent+'80':'var(--border)'}`,display:'flex',alignItems:'center',justifyContent:'center' }}>
                        <span style={{ fontSize:7.5,fontWeight:800,color:s?s.text:'var(--text-4)',textTransform:'uppercase' }}>{sl.s[0]}</span>
                      </div>;
                    })}
                  </div>
                </div>
                {hBks.length>0&&(
                  <div style={{ padding:'8px 10px',display:'flex',flexDirection:'column',gap:5 }}>
                    {hBks.map(b=>{
                      const slot=slotOf(b.slot); const s=statusOf(b.status);
                      return (
                        <div key={b.id} onClick={()=>onBookingClick(b)} style={{ display:'flex',alignItems:'center',gap:8,padding:'8px 10px',borderRadius:10,background:s.bg,border:`1px solid ${s.accent}50`,cursor:'pointer',backgroundImage:b.status==='pencil'?STRIPE:'none' }}>
                          <div style={{ flex:1,minWidth:0 }}>
                            <p style={{ fontSize:12.5,fontWeight:800,color:'var(--text-1)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap' }}>{b.fn}</p>
                            <p style={{ fontSize:10.5,color:'var(--text-3)',marginTop:1 }}>{slot.label} · {b.customer} · {b.guests} pax</p>
                          </div>
                          <span style={{ fontSize:9.5,fontWeight:800,padding:'2px 7px',borderRadius:9999,background:'rgba(255,255,255,0.7)',color:s.text,flexShrink:0 }}>{fmtINR(b.grand)}</span>
                        </div>
                      );
                    })}
                  </div>
                )}
                {!hBks.length&&<div style={{ padding:'10px 12px',fontSize:11,color:'var(--text-4)',fontStyle:'italic' }}>Available — tap to book</div>}
              </div>
            );
          })}
          <div style={{ height:8 }}/>
        </div>
      </div>
    );
  }

  // Desktop week: halls × 7 days matrix
  return (
    <div className="fade-in" style={{ flex:1,display:'flex',flexDirection:'column',overflow:'hidden' }}>
      {/* Column header */}
      <div style={{ display:'grid',gridTemplateColumns:'170px repeat(7,1fr)',background:'var(--surface-2)',borderBottom:'1px solid var(--border)',flexShrink:0,overflow:'hidden' }}>
        <div style={{ padding:'8px 12px',fontSize:10,fontWeight:800,textTransform:'uppercase',letterSpacing:'0.06em',color:'var(--text-4)',borderRight:'1px solid var(--border)' }}>Hall</div>
        {days.map((d,i)=>{
          const isToday=isoDate(d)===TODAY_ISO; const isWk=d.getDay()===0||d.getDay()===6;
          return (
            <div key={i} onClick={()=>onDayClick(isoDate(d))} style={{ padding:'8px 10px',borderRight:i<6?'1px solid var(--border)':'none',background:isToday?'var(--teal-50)':'transparent',cursor:'pointer',position:'relative' }}>
              {isToday&&<div style={{ position:'absolute',left:0,right:0,bottom:-1,height:2,background:'var(--teal-500)' }}/>}
              <div style={{ fontSize:9.5,fontWeight:800,textTransform:'uppercase',letterSpacing:'0.08em',color:isWk?'#dc2626':isToday?'var(--teal-700)':'var(--text-4)' }}>{dayName(d)}</div>
              <div style={{ fontSize:18,fontWeight:800,letterSpacing:'-0.02em',color:isToday?'var(--teal-700)':'var(--text-1)',fontVariantNumeric:'tabular-nums',lineHeight:1,marginTop:3 }}>{d.getDate()}</div>
            </div>
          );
        })}
      </div>
      {/* Rows */}
      <div style={{ flex:1,display:'grid',gridTemplateColumns:'170px repeat(7,1fr)',gridTemplateRows:`repeat(${HALLS.length},1fr)`,background:'var(--surface)',minHeight:0,overflow:'hidden' }}>
        {HALLS.map((hall,hIdx)=>(
          <React.Fragment key={hall.id}>
            <div style={{ padding:'10px 0 10px 14px',borderRight:'1px solid var(--border)',borderBottom:hIdx<HALLS.length-1?'1px solid var(--border)':'none',background:'var(--surface-2)',display:'flex',alignItems:'center',gap:10,position:'relative' }}>
              <div style={{ position:'absolute',left:0,top:6,bottom:6,width:4,borderRadius:'0 3px 3px 0',background:hall.color }}/>
              <div>
                <div style={{ fontSize:13,fontWeight:800,color:'var(--text-1)',letterSpacing:'-0.01em' }}>{hall.name}</div>
                <div style={{ fontSize:10.5,color:'var(--text-4)',marginTop:2 }}>cap. {hall.capacity}</div>
              </div>
            </div>
            {days.map((d,dIdx)=>{
              const iso=isoDate(d); const isToday=iso===TODAY_ISO;
              const dayHallBks=forDate(iso).filter(b=>b.hall===hall.id);
              return (
                <div key={dIdx} style={{ borderRight:dIdx<6?'1px solid var(--border)':'none',borderBottom:hIdx<HALLS.length-1?'1px solid var(--border)':'none',background:isToday?'rgba(20,184,166,0.04)':'var(--surface)',display:'grid',gridTemplateRows:'repeat(4,1fr)',padding:3,gap:2,minWidth:0,overflow:'hidden' }}>
                  {SLOTS.map((slot,sIdx)=>{
                    const list=dayHallBks.filter(b=>b.slot===slot.id);
                    const b=list[0]; const conflict=list.length>1;
                    if(!b) return <div key={slot.id} style={{ borderRadius:4,background:'var(--surface-2)',display:'flex',alignItems:'center',paddingLeft:5,opacity:0.6 }}><span style={{ fontSize:8.5,color:'var(--text-4)',fontWeight:700,textTransform:'uppercase' }}>{slot.s[0]}</span></div>;
                    const s=statusOf(b.status); const isPencil=b.status==='pencil';
                    return (
                      <div key={slot.id} onClick={()=>onBookingClick(b)} title={`${b.fn} · ${b.customer}`} style={{
                        background:s.bg,color:s.text,backgroundImage:isPencil?STRIPE:'none',
                        borderRadius:4,padding:'3px 5px',display:'flex',flexDirection:'column',gap:1,minHeight:0,overflow:'hidden',cursor:'pointer',
                        border:conflict?'1px solid #ef4444':'none',
                      }}>
                        <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',gap:2 }}>
                          <span style={{ fontSize:8.5,fontWeight:700,opacity:0.65,textTransform:'uppercase',letterSpacing:'0.03em' }}>{slot.s}</span>
                          {conflict&&<span style={{ color:'#ef4444',display:'flex' }}>{IC.warn}</span>}
                        </div>
                        <div style={{ fontSize:10.5,fontWeight:800,lineHeight:1.15,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap' }}>{b.fn}</div>
                        <div style={{ fontSize:9.5,opacity:0.8,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap' }}>{b.customer}</div>
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════ DAY VIEW ═══════════════ */
function DayView({ focusDate, onBookingClick, isMobile }) {
  const d = parseDate(focusDate);
  const dayBks = forDate(focusDate).sort((a,b)=>slotOf(a.slot).startH-slotOf(b.slot).startH);


  // Mobile: slot-grouped list
  if (isMobile) {
    const grouped = SLOTS.map(sl=>({ slot:sl, list:dayBks.filter(b=>b.slot===sl.id) }));
    return (
      <div className="fade-in" style={{ flex:1,display:'flex',flexDirection:'column',overflow:'hidden' }}>
        {/* Date + conflict alert */}
        <div style={{ padding:'10px 14px 8px',background:'var(--surface)',borderBottom:'1px solid var(--border)',flexShrink:0 }}>
          <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between' }}>
            <div>
              <p style={{ fontSize:11,fontWeight:700,color:'var(--teal-600)',textTransform:'uppercase',letterSpacing:'0.08em' }}>{focusDate===TODAY_ISO?'Today':''}  {dayName(d,false)}</p>
              <p style={{ fontSize:22,fontWeight:800,color:'var(--text-1)',letterSpacing:'-0.025em',lineHeight:1.1,marginTop:2 }}>{d.getDate()} {monthName(d,true)} {d.getFullYear()}</p>
            </div>
            <div style={{ textAlign:'right' }}>
              <p style={{ fontSize:13,fontWeight:700,color:'var(--text-1)',fontVariantNumeric:'tabular-nums' }}>{dayBks.length} bookings</p>
              <p style={{ fontSize:11,color:'var(--text-4)',marginTop:2 }}>{fmtINR(dayBks.reduce((s,b)=>s+b.grand,0))} revenue</p>
            </div>
          </div>
          {/* Hall occupancy dots */}
          <div style={{ display:'flex',gap:8,marginTop:10 }}>
            {HALLS.map(h=>{
              const count=dayBks.filter(b=>b.hall===h.id).length;
              return (
                <div key={h.id} style={{ display:'flex',alignItems:'center',gap:5,padding:'4px 9px',borderRadius:9999,background:`${h.color}14`,border:`1px solid ${h.color}30` }}>
                  <span style={{ width:6,height:6,borderRadius:'50%',background:h.color }}/>
                  <span style={{ fontSize:11,fontWeight:700,color:h.color }}>{h.short}</span>
                  <span style={{ fontSize:10.5,fontWeight:800,color:h.color,background:'white',borderRadius:9999,padding:'0 5px',fontVariantNumeric:'tabular-nums' }}>{count}</span>
                </div>
              );
            })}
          </div>
        </div>
        {/* Conflict alert */}
        {dayBks.some(b=>b.conflict)&&(
          <div style={{ display:'flex',alignItems:'center',gap:8,padding:'9px 14px',background:'#fef2f2',borderBottom:'1px solid #fca5a5',fontSize:12,fontWeight:600,color:'#991b1b',flexShrink:0 }}>
            {IC.warn} Crystal Hall Lunch is double-booked on this date
          </div>
        )}
        <div style={{ flex:1,overflowY:'auto',padding:'10px 12px 80px' }}>
          {grouped.map(g=>g.list.length===0?null:(
            <div key={g.slot.id} style={{ marginBottom:16 }}>
              <div style={{ display:'flex',alignItems:'flex-end',gap:8,marginBottom:7 }}>
                <div>
                  <p style={{ fontSize:9.5,fontWeight:800,color:'var(--text-4)',textTransform:'uppercase',letterSpacing:'0.08em' }}>{g.slot.label}</p>
                  <p style={{ fontSize:16,fontWeight:800,color:'var(--text-1)',letterSpacing:'-0.02em',lineHeight:1.1,marginTop:1,fontVariantNumeric:'tabular-nums' }}>{g.slot.range}</p>
                </div>
                <span style={{ marginBottom:2,fontSize:11,color:'var(--text-4)',fontWeight:600 }}>{g.list.length} event{g.list.length!==1?'s':''}</span>
              </div>
              <div style={{ display:'flex',flexDirection:'column',gap:7 }}>
                {g.list.map(b=>{
                  const hall=hallOf(b.hall); const s=statusOf(b.status); const isPencil=b.status==='pencil';
                  return (
                    <div key={b.id} onClick={()=>onBookingClick(b)} style={{ background:'var(--surface)',borderRadius:14,border:'1px solid var(--border)',borderLeft:`5px solid ${hall.color}`,padding:'11px 12px',display:'flex',flexDirection:'column',gap:6,cursor:'pointer',backgroundImage:isPencil?'repeating-linear-gradient(135deg,transparent 0,transparent 8px,rgba(146,64,14,.03) 8px,rgba(146,64,14,.03) 9px)':'none' }}>
                      <div style={{ display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:8 }}>
                        <p style={{ fontSize:14,fontWeight:800,color:'var(--text-1)',lineHeight:1.2,flex:1 }}>{b.fn}</p>
                        <span style={{ fontSize:10,fontWeight:800,padding:'3px 8px',borderRadius:9999,background:s.bg,color:s.text,flexShrink:0,textTransform:'uppercase',letterSpacing:'0.04em' }}>{s.label}</span>
                      </div>
                      <div style={{ display:'flex',alignItems:'center',gap:10,fontSize:11.5,color:'var(--text-3)' }}>
                        <span style={{ display:'inline-flex',alignItems:'center',gap:5 }}><span style={{ width:6,height:6,borderRadius:'50%',background:hall.color }}/>{hall.name}</span>
                        <span>{b.type}</span>
                        <span style={{ display:'inline-flex',alignItems:'center',gap:4 }}>{IC.users}{b.guests}</span>
                        <span style={{ marginLeft:'auto',fontWeight:700,color:'var(--text-1)',fontVariantNumeric:'tabular-nums' }}>{fmtINR(b.grand)}</span>
                      </div>
                      {b.conflict&&<div style={{ display:'inline-flex',alignItems:'center',gap:5,fontSize:11,color:'#991b1b',fontWeight:600 }}>{IC.warn}Conflict on this slot</div>}
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  // Desktop: Hall rows × 4 Slot columns — no horizontal scroll
  return (
    <div className="fade-in" style={{ flex:1,display:'flex',flexDirection:'column',overflow:'hidden' }}>
      {/* Date summary bar */}
      <div style={{ padding:'10px 18px 8px',background:'var(--surface)',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:20,flexShrink:0,flexWrap:'wrap' }}>
        <div>
          <p style={{ fontSize:18,fontWeight:800,color:'var(--text-1)',letterSpacing:'-0.02em',lineHeight:1 }}>{dayName(d,false)}, {d.getDate()} {monthName(d)} {d.getFullYear()}</p>
          <p style={{ fontSize:12,color:'var(--text-4)',marginTop:3 }}>{dayBks.length} bookings · {fmtINR(dayBks.reduce((s,b)=>s+b.grand,0))} total revenue</p>
        </div>
        {dayBks.some(b=>b.conflict)&&(
          <div style={{ display:'flex',alignItems:'center',gap:7,padding:'7px 12px',background:'#fef2f2',border:'1px solid #fca5a5',borderRadius:10,fontSize:12,fontWeight:600,color:'#991b1b' }}>
            {IC.warn}Overbooking — Crystal Hall, Lunch slot
          </div>
        )}
      </div>

      {/* Hall × Slot grid — fills viewport, zero horizontal scroll */}
      <div style={{ flex:1,overflow:'hidden',display:'grid',gridTemplateColumns:'180px repeat(4,1fr)',gridTemplateRows:`auto repeat(${HALLS.length},1fr)` }}>
        {/* Header row: corner + 4 slot headers */}
        <div style={{ background:'var(--surface-2)',borderRight:'1px solid var(--border)',borderBottom:'1px solid var(--border)',padding:'8px 14px',fontSize:10,fontWeight:800,textTransform:'uppercase',letterSpacing:'0.06em',color:'var(--text-4)',display:'flex',alignItems:'center' }}>Hall</div>
        {SLOTS.map((slot,sIdx)=>(
          <div key={slot.id} style={{ background:'var(--surface-2)',borderRight:sIdx<3?'1px solid var(--border)':'none',borderBottom:'1px solid var(--border)',padding:'8px 14px' }}>
            <p style={{ fontSize:12,fontWeight:800,color:'var(--text-1)',letterSpacing:'-0.01em' }}>{slot.label}</p>
            <p style={{ fontSize:10.5,color:'var(--text-4)',marginTop:1,fontWeight:500 }}>{slot.range}</p>
          </div>
        ))}

        {/* Hall rows */}
        {HALLS.map((hall,hIdx)=>{
          const hallBks=dayBks.filter(b=>b.hall===hall.id);
          const isLast=hIdx===HALLS.length-1;
          return (
            <React.Fragment key={hall.id}>
              {/* Hall label */}
              <div style={{ borderRight:'1px solid var(--border)',borderBottom:isLast?'none':'1px solid var(--border)',background:'var(--surface-2)',display:'flex',alignItems:'stretch',minHeight:0 }}>
                <div style={{ width:5,background:hall.color,flexShrink:0 }}/>
                <div style={{ padding:'14px 16px',display:'flex',flexDirection:'column',justifyContent:'center',gap:4 }}>
                  <div style={{ fontSize:14,fontWeight:800,color:'var(--text-1)',letterSpacing:'-0.015em' }}>{hall.name}</div>
                  <div style={{ fontSize:10.5,color:'var(--text-4)',fontWeight:600,display:'flex',alignItems:'center',gap:6 }}>
                    <span style={{ display:'inline-flex',alignItems:'center',gap:3 }}>{IC.users}<span style={{ fontVariantNumeric:'tabular-nums' }}>{hall.capacity}</span></span>
                    <span>·</span>
                    <span style={{ fontVariantNumeric:'tabular-nums' }}>{hallBks.length} booking{hallBks.length!==1?'s':''}</span>
                  </div>
                </div>
              </div>

              {/* Slot cells */}
              {SLOTS.map((slot,sIdx)=>{
                const list=hallBks.filter(b=>b.slot===slot.id);
                const b=list[0]; const conflict=list.length>1;
                const isLastCol=sIdx===SLOTS.length-1;
                if(!b) return (
                  <div key={slot.id} style={{ borderRight:isLastCol?'none':'1px solid var(--border)',borderBottom:isLast?'none':'1px solid var(--border)',background:hall.tint,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',transition:'background 0.12s' }}
                    onMouseEnter={e=>e.currentTarget.style.background=`${hall.color}14`}
                    onMouseLeave={e=>e.currentTarget.style.background=hall.tint}>
                    <span style={{ fontSize:11,color:'var(--text-4)',fontWeight:500,opacity:0.6 }}>Available</span>
                  </div>
                );
                const s=statusOf(b.status); const isPencil=b.status==='pencil';
                return (
                  <div key={slot.id} onClick={()=>onBookingClick(b)} style={{ borderRight:isLastCol?'none':'1px solid var(--border)',borderBottom:isLast?'none':'1px solid var(--border)',background:'var(--surface)',padding:8,display:'flex',alignItems:'stretch',minHeight:0,overflow:'hidden',cursor:'pointer' }}>
                    <div style={{ flex:1,background:s.bg,color:s.text,backgroundImage:isPencil?STRIPE:'none',borderRadius:10,border:conflict?'2px solid #ef4444':`1.5px solid ${s.accent}60`,borderLeft:`4px solid ${hall.color}`,padding:'10px 12px',display:'flex',flexDirection:'column',justifyContent:'space-between',overflow:'hidden',minWidth:0 }}>
                      <div>
                        <div style={{ fontSize:13,fontWeight:800,color:'var(--text-1)',lineHeight:1.2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginBottom:3 }}>{b.fn}</div>
                        <div style={{ fontSize:11,color:'var(--text-3)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap' }}>{b.customer}</div>
                        <div style={{ fontSize:10.5,color:'var(--text-3)',marginTop:2 }}>{b.type}</div>
                      </div>
                      <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',gap:6,marginTop:6,flexWrap:'wrap' }}>
                        <span style={{ fontSize:9.5,fontWeight:800,padding:'2px 8px',borderRadius:9999,background:'rgba(255,255,255,0.65)',color:s.text,textTransform:'uppercase',letterSpacing:'0.03em' }}>{s.label}</span>
                        <span style={{ fontSize:10.5,fontWeight:700,color:'var(--text-2)',fontVariantNumeric:'tabular-nums',display:'inline-flex',alignItems:'center',gap:3 }}>{IC.users}{b.guests}</span>
                        {conflict&&<span style={{ color:'#ef4444',display:'flex',alignItems:'center',gap:3,fontSize:11,fontWeight:700 }}>{IC.warn}Conflict</span>}
                      </div>
                    </div>
                  </div>
                );
              })}
            </React.Fragment>
          );
        })}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════ MOBILE BOTTOM NAV ══════ */
function MobileBottomNav({ view, onView }) {
  return (
    <div style={{ height:58,background:'var(--surface)',borderTop:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-around',flexShrink:0,position:'relative' }}>
      {[['home','Home',false],['calendar-check','Bookings',false],['calendar','Calendar',true],['users','Guests',false]].map(([k,l,active])=>(
        <div key={k} style={{ display:'flex',flexDirection:'column',alignItems:'center',gap:3,color:active?'var(--teal-700)':'var(--text-4)',minWidth:48 }}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
            {k==='calendar'&&<><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>}
            {k==='home'&&<><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>}
            {k==='users'&&<><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></>}
            {k==='calendar-check'&&<><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><polyline points="9 16 11 18 15 14"/></>}
          </svg>
          <span style={{ fontSize:10,fontWeight:active?700:500 }}>{l}</span>
        </div>
      ))}
      {/* FAB */}
      <div style={{ position:'absolute',top:-18,left:'50%',transform:'translateX(-50%)',width:46,height:46,borderRadius:15,background:'linear-gradient(135deg,#0d9488,#14b8a6)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 6px 14px rgba(13,148,136,.4)',color:'white',cursor:'pointer' }}>
        {IC.plus}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════ APP ════════════════════ */
function App() {
  const [view,    setView]    = useState('week');
  const [focus,   setFocus]   = useState(TODAY_ISO);
  const [booking, setBooking] = useState(null);
  const [theme,   setTheme]   = useState(()=>localStorage.getItem('bk_theme')||'light');
  const [mobile,  setMobile]  = useState(()=>window.innerWidth<768);

  useEffect(()=>{
    document.documentElement.dataset.theme=theme;
    localStorage.setItem('bk_theme',theme);
  },[theme]);

  useEffect(()=>{
    const check=()=>setMobile(window.innerWidth<768);
    window.addEventListener('resize',check);
    return ()=>window.removeEventListener('resize',check);
  },[]);

  // Navigation
  const navigate = useCallback((dir)=>{
    const d=parseDate(focus);
    if(view==='month')      d.setMonth(d.getMonth()+dir);
    else if(view==='week')  d.setDate(d.getDate()+dir*7);
    else                    d.setDate(d.getDate()+dir);
    setFocus(isoDate(d));
  },[view,focus]);

  const handleDayClick = useCallback((iso)=>{
    setFocus(iso);
    setView('day');
  },[]);

  const periodLabel = useMemo(()=>{
    const d=parseDate(focus);
    if(view==='month') return `${monthName(d)} ${d.getFullYear()}`;
    if(view==='week') {
      const ws=weekStart(focus); const we=new Date(ws); we.setDate(ws.getDate()+6);
      return `${ws.getDate()} – ${we.getDate()} ${monthName(we)} ${we.getFullYear()}`;
    }
    return `${dayName(d,false)}, ${d.getDate()} ${monthName(d,true)} ${d.getFullYear()}`;
  },[view,focus]);

  return (
    <div style={{ height:'100%',display:'flex',flexDirection:'column',background:'var(--bg)',fontFamily:"'Inter',sans-serif",overflow:'hidden' }}>
      <Toolbar
        view={view} onView={setView}
        focusDate={focus}
        onPrev={()=>navigate(-1)} onNext={()=>navigate(1)}
        onToday={()=>setFocus(TODAY_ISO)}
        theme={theme} onTheme={()=>setTheme(t=>t==='dark'?'light':'dark')}
        isMobile={mobile}
      />
      {!mobile && <HallLegend />}

      {view==='month' && <MonthView focusDate={focus} onDayClick={handleDayClick} isMobile={mobile} />}
      {view==='week'  && <WeekView  focusDate={focus} onDayClick={handleDayClick} onBookingClick={setBooking} isMobile={mobile} />}
      {view==='day'   && <DayView   focusDate={focus} onBookingClick={setBooking} isMobile={mobile} />}

      {mobile && <MobileBottomNav view={view} onView={setView} />}

      {booking && <BookingDrawer booking={booking} onClose={()=>setBooking(null)} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
