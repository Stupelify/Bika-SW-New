<!DOCTYPE html>
<!-- @dsCard group="UI Kit — Booking Dashboard" name="Booking Dashboard UI Kit" subtitle="Full interactive prototype — login, dashboard, bookings, form" viewport="1440x860" -->
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bika Banquet — UI Kit</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8fafc; --surface: #ffffff; --surface-2: #f1f5f9; --surface-3: #e2e8f0;
    --text-1: #0f172a; --text-2: #334155; --text-3: #64748b; --text-4: #6b7280;
    --border: #e2e8f0; --border-2: #cbd5e1;
    --teal-50: #f0fdfa; --teal-100: #ccfbf1; --teal-200: #99f6e4;
    --teal-400: #2dd4bf; --teal-500: #14b8a6; --teal-600: #0d9488; --teal-700: #0f766e;
    --accent-100: #ffedd5;
    --shadow-xs: 0 1px 2px rgba(15,23,42,0.04);
    --shadow-sm: 0 1px 3px rgba(15,23,42,0.06), 0 1px 2px rgba(15,23,42,0.04);
    --shadow-md: 0 4px 6px rgba(15,23,42,0.05), 0 2px 4px rgba(15,23,42,0.04);
    --ring: rgba(13,148,136,0.18);
  }
  [data-theme="dark"] {
    --bg: #0f1011; --surface: #141516; --surface-2: #1b1c1e; --surface-3: #222426;
    --text-1: #f8fafc; --text-2: #e2e8f0; --text-3: #b3b8c2; --text-4: #8b93a1;
    --border: #1f1f1f; --border-2: #2a2a2a;
    --teal-50: #021c1b; --teal-100: #08302e;
    --shadow-xs: 0 1px 2px rgba(0,0,0,0.45);
    --shadow-sm: 0 2px 6px rgba(0,0,0,0.5);
    --shadow-md: 0 8px 18px rgba(0,0,0,0.55);
    --ring: rgba(20,184,166,0.28);
  }
  html, body, #root { height: 100%; overflow: hidden; }
  body { font-family: 'Inter', ui-sans-serif, sans-serif; font-size: 15px; color: var(--text-2); background: var(--bg); -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 3px; }
  @keyframes pageIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .page-enter { animation: pageIn 0.18s cubic-bezier(0.25,0.46,0.45,0.94) both; }
  @keyframes shimmer { from { background-position: -400px 0; } to { background-position: 400px 0; } }
  .skeleton { background: linear-gradient(90deg, var(--surface-2) 25%, var(--surface-3) 50%, var(--surface-2) 75%); background-size: 400px 100%; animation: shimmer 1.4s infinite linear; border-radius: 6px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="StatusBadge.jsx"></script>
<script type="text/babel" src="KpiCard.jsx"></script>
<script type="text/babel" src="BookingsTable.jsx"></script>
<script type="text/babel" src="BookingForm.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

/* ─── Login Page ─────────────────────────────────────────────── */
function LoginPage({ onLogin }) {
  const [email, setEmail] = useState('admin@bikabanquet.com');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);
  const [show, setShow] = useState(false);

  const inp = { width: '100%', borderRadius: 12, padding: '10px 12px', fontSize: 14, fontFamily: 'inherit', border: '1px solid var(--border-2)', background: 'var(--surface)', color: 'var(--text-1)', outline: 'none', transition: 'border-color 0.15s, box-shadow 0.15s', boxSizing: 'border-box' };
  const focus = e => { e.target.style.borderColor = '#14b8a6'; e.target.style.boxShadow = '0 0 0 3px rgba(13,148,136,0.18)'; };
  const blur  = e => { e.target.style.borderColor = 'var(--border-2)'; e.target.style.boxShadow = 'none'; };

  const submit = e => {
    e.preventDefault();
    setLoading(true);
    setTimeout(() => { setLoading(false); onLogin(); }, 900);
  };

  return (
    <div style={{ minHeight: '100%', background: 'var(--bg)', padding: '48px 20px 40px', overflowY: 'auto' }}>
      <div style={{ maxWidth: 900, margin: '0 auto', display: 'grid', gridTemplateColumns: '1fr', gap: 16 }}>
        <div style={{ display: 'grid', gridTemplateColumns: '1.6fr 1fr', gap: 16 }}>
          {/* Hero card */}
          <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 18, boxShadow: 'var(--shadow-xs)', overflow: 'hidden', position: 'relative' }}>
            <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(135deg, rgba(204,251,241,0.7) 0%, rgba(255,255,255,0.9) 50%, rgba(255,237,213,0.6) 100%)', pointerEvents: 'none' }} />
            <div style={{ position: 'relative', padding: '28px 32px' }}>
              <span style={{ display: 'inline-flex', borderRadius: 9999, border: '1px solid var(--teal-200)', background: 'white', padding: '3px 12px', fontSize: 11, fontWeight: 700, color: 'var(--teal-700)', letterSpacing: '0.02em' }}>Hospitality Operations Suite</span>
              <h1 style={{ marginTop: 20, fontSize: 42, fontFamily: 'Georgia, serif', color: 'var(--text-1)', lineHeight: 1.1, fontWeight: 400 }}>Bika Banquet</h1>
              <p style={{ marginTop: 10, fontSize: 15, color: 'var(--text-2)', maxWidth: 400, lineHeight: 1.6 }}>Run enquiries, bookings, menus, payments and reporting from one modern command center.</p>
              <div style={{ marginTop: 28, display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 10 }}>
                {[['Workflows','9 modules'],['Real-time','Live metrics'],['Team Access','RBAC ready']].map(([k,v]) => (
                  <div key={k} style={{ borderRadius: 12, border: '1px solid var(--border)', background: 'rgba(255,255,255,0.9)', padding: '12px 14px' }}>
                    <p style={{ fontSize: 10, color: 'var(--text-4)', textTransform: 'uppercase', letterSpacing: '0.06em', fontWeight: 600 }}>{k}</p>
                    <p style={{ fontSize: 18, fontFamily: 'Georgia, serif', color: 'var(--text-1)', marginTop: 4 }}>{v}</p>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Sign-in card */}
          <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 18, boxShadow: 'var(--shadow-xs)', padding: '28px 24px' }}>
            <h2 style={{ fontSize: 22, fontFamily: 'Georgia, serif', color: 'var(--text-1)', marginBottom: 4 }}>Sign In</h2>
            <p style={{ fontSize: 13, color: 'var(--text-3)', marginBottom: 24 }}>Access your operations dashboard.</p>
            <form onSubmit={submit} style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
              <div>
                <label style={{ display: 'block', fontSize: 12.5, fontWeight: 600, color: 'var(--text-2)', marginBottom: 5 }}>Email Address</label>
                <input style={inp} type="email" value={email} onChange={e => setEmail(e.target.value)} onFocus={focus} onBlur={blur} />
              </div>
              <div>
                <label style={{ display: 'block', fontSize: 12.5, fontWeight: 600, color: 'var(--text-2)', marginBottom: 5 }}>Password</label>
                <div style={{ position: 'relative' }}>
                  <input style={{ ...inp, paddingRight: 36 }} type={show ? 'text' : 'password'} placeholder="••••••••" value={password} onChange={e => setPassword(e.target.value)} onFocus={focus} onBlur={blur} />
                  <button type="button" onClick={() => setShow(s => !s)} style={{ position: 'absolute', right: 10, top: '50%', transform: 'translateY(-50%)', border: 'none', background: 'none', cursor: 'pointer', color: 'var(--text-4)', display: 'flex', padding: 2 }}>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
                      {show ? <><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></> : <><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></>}
                    </svg>
                  </button>
                </div>
              </div>
              <button type="submit" disabled={loading} style={{ padding: '11px', borderRadius: 12, border: 'none', background: 'var(--teal-600)', color: 'white', fontSize: 14, fontWeight: 600, cursor: loading ? 'not-allowed' : 'pointer', fontFamily: 'inherit', opacity: loading ? 0.75 : 1, transition: 'opacity 0.15s' }}>
                {loading ? 'Signing in…' : 'Sign In'}
              </button>
            </form>
            <p style={{ fontSize: 11, color: 'var(--text-4)', marginTop: 16, textAlign: 'center' }}>Demo: any email + password will work</p>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── Top Header ─────────────────────────────────────────────── */
function Header({ page, onToggleSidebar, onToggleTheme, theme, onOpenPalette }) {
  const LABELS = { dashboard: 'Dashboard', bookings: 'Bookings', calendar: 'Calendar', customers: 'Customers', enquiries: 'Enquiries', payments: 'Payments', venues: 'Venues', menu: 'Menu & Items', reports: 'Reports', logs: 'Activity Logs', settings: 'Settings' };
  return (
    <header style={{ height: 52, background: 'var(--surface)', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', paddingLeft: 16, paddingRight: 16, gap: 12, position: 'sticky', top: 0, zIndex: 30, flexShrink: 0 }}>
      <button onClick={onToggleSidebar} style={{ border: 'none', background: 'transparent', color: 'var(--text-3)', borderRadius: 8, width: 30, height: 30, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <img src="https://assets.zyrosite.com/MBlLcEqY2yw3y2EF/1-2-removebg-scaled-e1752152009924-7iV2qZXAcVUCou9o.png" alt="logo" style={{ width: 28, height: 28, objectFit: 'contain', flexShrink: 0 }} />
      <span style={{ color: 'var(--text-4)', fontSize: 15, fontWeight: 400 }}>|</span>
      <nav style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 12.5 }}>
        <span style={{ color: 'var(--text-4)' }}>dashboard</span>
        {page !== 'dashboard' && <><span style={{ color: 'var(--text-4)', fontSize: 11 }}>›</span><span style={{ color: 'var(--text-1)', fontWeight: 550 }}>{LABELS[page] || page}</span></>}
      </nav>
      <div style={{ flex: 1 }} />
      <button onClick={onOpenPalette} style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '5px 12px', background: 'var(--surface-2)', border: '1px solid var(--border)', borderRadius: 12, fontSize: 12, color: 'var(--text-4)', cursor: 'pointer', fontFamily: 'inherit', transition: 'border-color 0.15s' }}>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        Quick search…
        <span style={{ background: 'var(--surface)', border: '1px solid var(--border-2)', borderRadius: 4, padding: '1px 5px', fontSize: 10, color: 'var(--text-4)', fontFamily: 'monospace' }}>⌘K</span>
      </button>
      <button onClick={onToggleTheme} title={theme === 'dark' ? 'Light mode' : 'Dark mode'} style={{ border: '1px solid var(--border)', background: 'var(--surface)', color: 'var(--text-3)', borderRadius: 10, padding: '6px 7px', display: 'flex', alignItems: 'center', cursor: 'pointer', transition: 'all 0.15s' }}>
        {theme === 'dark'
          ? <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          : <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        }
      </button>
      <div style={{ width: 32, height: 32, borderRadius: '50%', background: 'linear-gradient(135deg, #14b8a6, #0d9488)', color: 'white', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 12, fontWeight: 700, flexShrink: 0 }}>A</div>
    </header>
  );
}

/* ─── Dashboard Home ─────────────────────────────────────────── */
function DashboardHome({ onNavigate }) {
  const kpis = [
    { label: 'Total Revenue', value: 2450000, format: 'currency', delta: 12, sparkline: [120,145,138,160,175,168,195,210] },
    { label: 'Total Bookings', value: 142, delta: 8, sparkline: [18,22,19,25,28,24,30,32] },
    { label: 'Pencil Bookings', value: 7, delta: -5, sparkline: [3,5,4,6,3,5,4,7] },
    { label: 'Avg. Booking Value', value: 172535, format: 'currency', delta: 3, sparkline: [160000,165000,158000,172000,168000,175000,170000,172000] },
  ];

  const halls = [
    { name: 'Crystal Hall', revenue: 850000, bookings: 12 },
    { name: 'Grand Banquet', revenue: 620000, bookings: 9 },
    { name: 'Emerald Room', revenue: 480000, bookings: 7 },
    { name: 'Rose Garden', revenue: 310000, bookings: 5 },
    { name: 'Sapphire Suite', revenue: 190000, bookings: 3 },
  ];
  const maxRev = halls[0].revenue;

  const months = ['Jun','Jul','Aug','Sep','Oct','Nov','Dec','Jan'];
  const revData = [680000, 720000, 640000, 810000, 880000, 760000, 920000, 920000];
  const maxBar = Math.max(...revData);
  const chartH = 140, padB = 24, padL = 44, padT = 8, padR = 8;
  const innerH = chartH - padT - padB;
  const innerW = 580 - padL - padR;
  const barW = Math.floor((innerW - 4 * 7) / 8);

  const insights = [
    { title: 'Cancellation rate', value: '8.4%', detail: 'Healthy cancellation trend for the selected period.', tone: 'good' },
    { title: 'Collection efficiency', value: '74.2%', detail: 'Advance collections are tracking well.', tone: 'good' },
    { title: 'Next 30-day load', value: '18 events', detail: 'Use this to plan staffing and kitchen prep windows.', tone: 'neutral' },
    { title: 'Weekend concentration', value: '62.5%', detail: 'Higher weekend load — consider weekend crew planning.', tone: 'warn' },
  ];

  const insightBg = { good: '#f0fdf4', warn: '#fffbeb', neutral: 'var(--surface-2)' };
  const insightBorder = { good: '#bbf7d0', warn: '#fde68a', neutral: 'var(--border)' };
  const insightAccent = { good: '#22c55e', warn: '#f59e0b', neutral: 'var(--border-2)' };

  const recentBookings = SAMPLE_BOOKINGS.slice(0, 5);

  return (
    <div className="page-enter" style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
      {/* Page head */}
      <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 18, boxShadow: 'var(--shadow-xs)', padding: '16px 20px', display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 16, flexWrap: 'wrap' }}>
        <div>
          <h1 style={{ fontSize: 20, fontWeight: 700, color: 'var(--text-1)', letterSpacing: '-0.02em', lineHeight: 1.2 }}>Key Metrics &amp; Performance</h1>
          <p style={{ fontSize: 13, color: 'var(--text-4)', marginTop: 3 }}>Revenue view from 01/01/2024 to 16/05/2026</p>
        </div>
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
          <select style={{ borderRadius: 10, padding: '6px 10px', fontSize: 12.5, border: '1px solid var(--border-2)', background: 'var(--surface)', color: 'var(--text-2)', fontFamily: 'inherit', cursor: 'pointer', outline: 'none' }}>
            <option>All time</option><option>Last 1 year</option><option>Last 6 months</option>
          </select>
          <button style={{ display: 'inline-flex', alignItems: 'center', gap: 6, padding: '6px 14px', borderRadius: 12, border: 'none', background: 'var(--teal-600)', color: 'white', fontSize: 13, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit' }}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
            Refresh
          </button>
        </div>
      </div>

      {/* KPI grid */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 16 }}>
        {kpis.map(k => <KpiCard key={k.label} {...k} />)}
      </div>

      {/* Charts row */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1.3fr 1fr', gap: 16 }}>
        {/* Top halls */}
        <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 18, boxShadow: 'var(--shadow-xs)', overflow: 'hidden' }}>
          <div style={{ padding: '14px 18px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <div><p style={{ fontSize: 13.5, fontWeight: 600, color: 'var(--text-1)' }}>Top Performing Halls</p><p style={{ fontSize: 11.5, color: 'var(--text-4)', marginTop: 2 }}>By revenue in selected period</p></div>
            <button onClick={() => onNavigate('reports')} style={{ fontSize: 11.5, fontWeight: 600, color: 'var(--teal-600)', background: 'none', border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 2, fontFamily: 'inherit' }}>View all <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></button>
          </div>
          <div style={{ padding: '12px 18px', display: 'flex', flexDirection: 'column', gap: 10 }}>
            {halls.map((h, i) => (
              <div key={h.name} style={{ display: 'grid', gridTemplateColumns: '20px 1fr 80px auto', alignItems: 'center', gap: 10 }}>
                <span style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-4)', fontVariantNumeric: 'tabular-nums' }}>{i+1}</span>
                <span style={{ fontSize: 13, fontWeight: 600, color: 'var(--text-1)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{h.name}</span>
                <div style={{ height: 6, borderRadius: 3, background: 'var(--surface-2)', overflow: 'hidden' }}>
                  <div style={{ height: '100%', borderRadius: 3, background: 'linear-gradient(90deg, #2dd4bf, #0d9488)', width: `${Math.max(10, (h.revenue/maxRev)*100)}%` }} />
                </div>
                <span style={{ fontSize: 13, fontWeight: 600, color: 'var(--text-1)', fontVariantNumeric: 'tabular-nums', whiteSpace: 'nowrap' }}>₹{(h.revenue/100000).toFixed(1)}L</span>
              </div>
            ))}
          </div>
        </div>

        {/* Bar chart */}
        <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 18, boxShadow: 'var(--shadow-xs)', overflow: 'hidden' }}>
          <div style={{ padding: '14px 18px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <div><p style={{ fontSize: 13.5, fontWeight: 600, color: 'var(--text-1)' }}>Monthly Revenue</p><p style={{ fontSize: 11.5, color: 'var(--text-4)', marginTop: 2 }}>Last 8 months trend</p></div>
            <span style={{ fontSize: 11, fontWeight: 700, background: 'var(--teal-50)', color: 'var(--teal-700)', border: '1px solid var(--teal-200)', borderRadius: 9999, padding: '2px 10px' }}>₹ In Lakhs</span>
          </div>
          <div style={{ padding: '12px 16px' }}>
            <svg viewBox={`0 0 580 ${chartH}`} width="100%" height={chartH}>
              <defs><linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#2dd4bf"/><stop offset="100%" stopColor="#0d9488"/></linearGradient></defs>
              {[0,0.25,0.5,0.75,1].map(r => {
                const y = padT + innerH - innerH * r;
                return <g key={r}>
                  <line x1={padL} x2={580-padR} y1={y} y2={y} stroke="var(--border)" strokeDasharray="4 6" strokeWidth="0.75"/>
                  <text x={padL-6} y={y+4} textAnchor="end" fontSize="9" fill="var(--text-4)">₹{Math.round(maxBar*r/100000*10)/10}L</text>
                </g>;
              })}
              {revData.map((v, i) => {
                const x = padL + i * (barW + 7);
                const bh = (v / maxBar) * innerH;
                const by = padT + innerH - bh;
                const lx = x + barW / 2;
                return <g key={i}>
                  <rect x={x} y={by} width={barW} height={bh} rx="3" fill="url(#barGrad)" opacity="0.9"/>
                  <text x={lx} y={chartH-6} textAnchor="middle" fontSize="9" fill="var(--text-4)">{months[i]}</text>
                </g>;
              })}
            </svg>
          </div>
        </div>

        {/* Insights */}
        <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 18, boxShadow: 'var(--shadow-xs)', overflow: 'hidden' }}>
          <div style={{ padding: '14px 18px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <div><p style={{ fontSize: 13.5, fontWeight: 600, color: 'var(--text-1)' }}>Business Insights</p><p style={{ fontSize: 11.5, color: 'var(--text-4)', marginTop: 2 }}>Actionable metrics</p></div>
            <span style={{ fontSize: 11, fontWeight: 700, background: '#fffbeb', color: '#92400e', border: '1px solid #fde68a', borderRadius: 9999, padding: '2px 10px', display: 'flex', alignItems: 'center', gap: 4 }}>
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
              Actionable
            </span>
          </div>
          <div style={{ padding: '12px 14px', display: 'flex', flexDirection: 'column', gap: 8 }}>
            {insights.map(ins => (
              <div key={ins.title} style={{ borderRadius: 12, padding: '10px 12px', border: `1px solid ${insightBorder[ins.tone]}`, background: insightBg[ins.tone], position: 'relative', overflow: 'hidden' }}>
                <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 3, background: insightAccent[ins.tone], borderRadius: '2px 2px 0 0' }} />
                <p style={{ fontSize: 10, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--text-4)', marginBottom: 3 }}>{ins.title}</p>
                <p style={{ fontSize: 17, fontWeight: 700, letterSpacing: '-0.03em', color: 'var(--text-1)', fontVariantNumeric: 'tabular-nums', marginBottom: 3 }}>{ins.value}</p>
                <p style={{ fontSize: 11, color: 'var(--text-3)', lineHeight: 1.4 }}>{ins.detail}</p>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Recent bookings */}
      <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 18, boxShadow: 'var(--shadow-xs)', overflow: 'hidden' }}>
        <div style={{ padding: '14px 20px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <h2 style={{ fontSize: 13.5, fontWeight: 600, color: 'var(--text-1)' }}>Recent Bookings</h2>
          <button onClick={() => onNavigate('bookings')} style={{ fontSize: 11.5, fontWeight: 600, color: 'var(--teal-600)', background: 'none', border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 3, fontFamily: 'inherit' }}>View all <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></button>
        </div>
        <div style={{ padding: '10px 20px' }}>
          {recentBookings.map((b, i) => (
            <div key={b.id} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '10px 0', borderBottom: i < recentBookings.length-1 ? '1px solid var(--border)' : 'none', gap: 12 }}>
              <div style={{ flex: 1, minWidth: 0 }}>
                <p style={{ fontSize: 13.5, fontWeight: 600, color: 'var(--text-1)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{b.name}</p>
                <p style={{ fontSize: 11.5, color: 'var(--text-4)', marginTop: 2 }}>{b.customer} · {b.phone}</p>
              </div>
              <StatusBadge status={b.status} size="sm" />
              <div style={{ textAlign: 'right', flexShrink: 0 }}>
                <p style={{ fontSize: 13, color: 'var(--text-2)', fontVariantNumeric: 'tabular-nums' }}>{b.functionDate}</p>
                <p style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-1)', fontVariantNumeric: 'tabular-nums', marginTop: 2 }}>₹{b.grandTotal.toLocaleString('en-IN')}</p>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>

/* ─── Main App ───────────────────────────────────────────────── */
function App() {
  const [loggedIn, setLoggedIn] = useState(() => sessionStorage.getItem('bb_auth') === '1');
  const [page, setPage] = useState(() => sessionStorage.getItem('bb_page') || 'dashboard');
  const [collapsed, setCollapsed] = useState(false);
  const [theme, setTheme] = useState(() => localStorage.getItem('bb_theme') || 'light');
  const [paletteOpen, setPaletteOpen] = useState(false);

  useEffect(() => {
    document.documentElement.dataset.theme = theme;
    localStorage.setItem('bb_theme', theme);
  }, [theme]);

  const navigate = p => {
    setPage(p);
    sessionStorage.setItem('bb_page', p);
  };

  const login = () => {
    sessionStorage.setItem('bb_auth', '1');
    setLoggedIn(true);
  };

  const logout = () => {
    sessionStorage.removeItem('bb_auth');
    sessionStorage.removeItem('bb_page');
    setLoggedIn(false);
    setPage('dashboard');
  };

  const pageContent = useMemo(() => {
    if (page === 'dashboard') return <DashboardHome onNavigate={navigate} />;
    if (page === 'bookings')  return <BookingsPage />;
    return <PlaceholderPage name={{ calendar:'Calendar', customers:'Customers', enquiries:'Enquiries', payments:'Payments', venues:'Venues', menu:'Menu & Items', reports:'Reports', logs:'Activity Logs', settings:'Settings' }[page] || page} />;
  }, [page]);

  if (!loggedIn) return <LoginPage onLogin={login} />;

  const sidebarW = collapsed ? 64 : 208;

  return (
    <div style={{ height: '100%', background: 'var(--bg)', display: 'flex', overflow: 'hidden' }}>
      <Sidebar active={page} onNavigate={navigate} collapsed={collapsed} onLogout={logout} />
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0, overflow: 'hidden' }}>
        <Header page={page} onToggleSidebar={() => setCollapsed(c => !c)} onToggleTheme={() => setTheme(t => t === 'dark' ? 'light' : 'dark')} theme={theme} onOpenPalette={() => setPaletteOpen(true)} />
        <main style={{ flex: 1, overflowY: 'auto', overflowX: 'hidden', padding: 'clamp(16px,2vw,28px)' }}>
          <div style={{ maxWidth: 1400, margin: '0 auto' }} key={page}>
            {pageContent}
          </div>
        </main>
      </div>

      {/* Command palette mock */}
      {paletteOpen && (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(15,23,42,0.5)', zIndex: 200, display: 'flex', alignItems: 'flex-start', justifyContent: 'center', paddingTop: 120 }} onClick={() => setPaletteOpen(false)}>
          <div style={{ background: 'var(--surface)', borderRadius: 16, boxShadow: '0 20px 40px rgba(15,23,42,0.2)', width: 560, overflow: 'hidden' }} onClick={e => e.stopPropagation()}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '12px 16px', borderBottom: '1px solid var(--border)' }}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-4)" strokeWidth="1.75" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              <input autoFocus placeholder="Search bookings, customers, actions…" style={{ flex: 1, border: 'none', outline: 'none', fontSize: 14, background: 'transparent', color: 'var(--text-1)', fontFamily: 'inherit' }} />
              <kbd style={{ fontSize: 11, background: 'var(--surface-2)', border: '1px solid var(--border-2)', borderRadius: 4, padding: '2px 6px', color: 'var(--text-4)', fontFamily: 'monospace' }}>ESC</kbd>
            </div>
            {['Sharma Wedding Reception','Patel Corporate Dinner','Kumar Birthday Bash'].map(name => (
              <div key={name} style={{ padding: '10px 16px', display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer', borderBottom: '1px solid var(--border)' }}
                onMouseEnter={e => e.currentTarget.style.background = 'var(--teal-50)'}
                onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
                onClick={() => { setPaletteOpen(false); navigate('bookings'); }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-4)" strokeWidth="1.75" strokeLinecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><polyline points="9 16 11 18 15 14"/></svg>
                <span style={{ fontSize: 13, color: 'var(--text-2)' }}>{name}</span>
                <span style={{ marginLeft: 'auto', fontSize: 11, color: 'var(--text-4)' }}>Booking</span>
              </div>
            ))}
            <div style={{ padding: '8px 16px', fontSize: 11, color: 'var(--text-4)', display: 'flex', gap: 12 }}>
              <span>↑↓ navigate</span><span>↵ select</span><span>ESC close</span>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
